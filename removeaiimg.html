<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Logo Blur / Remove / Replace Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      padding: 30px;
      text-align: center;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 18px;
      max-width: 1050px;
      margin: auto;
      box-shadow: 0 10px 30px #0002;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
      margin-top: 20px;
      max-width: 100%;
      line-height: 0;
    }

    canvas {
      max-width: 100%;
      border: 2px dashed #999;
      cursor: crosshair;
      box-sizing: border-box;
    }

    #overlayCanvas {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
      border: 2px dashed transparent;
    }

    button, input, select {
      margin: 4px;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      background: #4f46e5;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #3730a3;
    }

    .danger {
      background: #dc2626;
    }

    .danger:hover {
      background: #991b1b;
    }

    .success {
      background: #059669;
    }

    .success:hover {
      background: #047857;
    }

    .note {
      color: #555;
      font-size: 14px;
      line-height: 1.6;
    }

    .status {
      color: #334155;
      font-size: 14px;
      min-height: 22px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>เครื่องมือเบลอ / ลบ / แทนที่โลโก้</h1>
  <p>ใช้กับภาพหรือ PDF เช่น Gemini, NotebookLM หรือโลโก้อื่น ๆ</p>

  <div class="toolbar">
    <input type="file" id="fileInput" accept="image/*,.pdf">
  </div>

  <div class="toolbar">
    <label>เลือกโหมด:</label>
    <select id="modeSelect">
      <option value="blur">Blur - เบลอวัตถุ</option>
      <option value="remove">Remove Object - ลบวัตถุ</option>
      <option value="replace">Replace Image - แทนที่ด้วยภาพใหม่</option>
    </select>

    <label>ภาพสำหรับแทนที่:</label>
    <input type="file" id="replaceInput" accept="image/*">
  </div>

  <div class="toolbar">
    <button onclick="applyAction()">ดำเนินการกับพื้นที่ที่เลือก</button>
    <button onclick="applyToAllPdfPages()" class="success">ใช้ตำแหน่งนี้กับ PDF ทุกหน้า</button>
    <button onclick="undo()">Undo</button>
    <button onclick="resetCanvas()" class="danger">ล้างใหม่</button>
    <button onclick="downloadImage()">ดาวน์โหลดภาพ PNG</button>
  </div>

  <p class="note">
    วิธีใช้: อัปโหลดไฟล์ → ลากกรอบบริเวณโลโก้/วัตถุ → เลือกโหมด → กดดำเนินการ<br>
    สำหรับ PDF: เลือกบริเวณบนหน้าแรก แล้วกด “ใช้ตำแหน่งนี้กับ PDF ทุกหน้า” เพื่อสร้าง PDF ใหม่
  </p>

  <div id="status" class="status"></div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  const fileInput = document.getElementById("fileInput");
  const replaceInput = document.getElementById("replaceInput");
  const modeSelect = document.getElementById("modeSelect");
  const canvas = document.getElementById("canvas");
  const overlayCanvas = document.getElementById("overlayCanvas");
  const ctx = canvas.getContext("2d");
  const overlayCtx = overlayCanvas.getContext("2d");
  const statusEl = document.getElementById("status");

  let baseImage = null;
  let initialImage = null;
  let history = [];
  let isDrawing = false;
  let startX = 0;
  let startY = 0;
  let selectedArea = null;
  let replaceImage = null;
  let pdfDoc = null;
  let pdfFileName = "edited-all-pages.pdf";
  let loadedFileType = null;
  let renderScale = 2;

  function setStatus(message) {
    statusEl.textContent = message || "";
  }

  fileInput.addEventListener("change", async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    clearOverlay();
    history = [];
    selectedArea = null;
    pdfDoc = null;
    loadedFileType = file.type;

    if (file.type === "application/pdf") {
      pdfFileName = file.name.replace(/\.pdf$/i, "") + "-edited.pdf";
      await renderPDF(file);
    } else {
      pdfFileName = "edited-image.png";
      renderImage(file);
    }
  });

  replaceInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      replaceImage = new Image();
      replaceImage.onload = function() {
        setStatus("อัปโหลดภาพสำหรับแทนที่เรียบร้อยแล้ว");
      };
      replaceImage.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  function resizeCanvases(width, height) {
    canvas.width = width;
    canvas.height = height;
    overlayCanvas.width = width;
    overlayCanvas.height = height;
    overlayCanvas.style.width = canvas.clientWidth + "px";
    overlayCanvas.style.height = canvas.clientHeight + "px";
  }

  function syncOverlaySize() {
    overlayCanvas.style.width = canvas.clientWidth + "px";
    overlayCanvas.style.height = canvas.clientHeight + "px";
  }

  window.addEventListener("resize", syncOverlaySize);

  function saveHistory() {
    history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  }

  function updateBaseImage() {
    baseImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  function renderImage(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        resizeCanvases(img.width, img.height);
        ctx.drawImage(img, 0, 0);
        initialImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
        updateBaseImage();
        syncOverlaySize();
        setStatus("โหลดภาพเรียบร้อยแล้ว");
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function renderPDF(file) {
    setStatus("กำลังโหลด PDF...");
    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdfDoc.getPage(1);

    const viewport = page.getViewport({ scale: renderScale });
    resizeCanvases(viewport.width, viewport.height);

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;

    initialImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
    updateBaseImage();
    syncOverlaySize();
    setStatus(`โหลด PDF เรียบร้อยแล้ว (${pdfDoc.numPages} หน้า) ขณะนี้แสดงหน้าแรก`);
  }

  canvas.addEventListener("mousedown", startSelect);
  canvas.addEventListener("mousemove", moveSelect);
  canvas.addEventListener("mouseup", endSelect);
  canvas.addEventListener("mouseleave", endSelect);

  canvas.addEventListener("touchstart", function(e) {
    e.preventDefault();
    startSelect(e.touches[0]);
  }, { passive: false });

  canvas.addEventListener("touchmove", function(e) {
    e.preventDefault();
    moveSelect(e.touches[0]);
  }, { passive: false });

  canvas.addEventListener("touchend", function(e) {
    e.preventDefault();
    endSelect();
  }, { passive: false });

  function startSelect(e) {
    if (!baseImage) return;
    const pos = getMousePos(e);
    startX = pos.x;
    startY = pos.y;
    isDrawing = true;
    selectedArea = null;
  }

  function moveSelect(e) {
    if (!isDrawing) return;

    const pos = getMousePos(e);
    const endX = pos.x;
    const endY = pos.y;

    const x = Math.min(startX, endX);
    const y = Math.min(startY, endY);
    const w = Math.abs(endX - startX);
    const h = Math.abs(endY - startY);

    selectedArea = clampArea({ x, y, w, h }, canvas.width, canvas.height);
    drawSelectionBox(selectedArea);
  }

  function endSelect() {
    isDrawing = false;
  }

  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (canvas.width / rect.width),
      y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function clampArea(area, maxWidth, maxHeight) {
    const x = Math.max(0, Math.min(area.x, maxWidth));
    const y = Math.max(0, Math.min(area.y, maxHeight));
    const w = Math.max(1, Math.min(area.w, maxWidth - x));
    const h = Math.max(1, Math.min(area.h, maxHeight - y));
    return { x, y, w, h };
  }

  function drawSelectionBox(area) {
    clearOverlay();
    overlayCtx.save();
    overlayCtx.strokeStyle = "#ef4444";
    overlayCtx.lineWidth = 4;
    overlayCtx.setLineDash([10, 7]);
    overlayCtx.strokeRect(area.x, area.y, area.w, area.h);
    overlayCtx.fillStyle = "rgba(239, 68, 68, 0.08)";
    overlayCtx.fillRect(area.x, area.y, area.w, area.h);
    overlayCtx.restore();
  }

  function clearOverlay() {
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  }

  function applyAction() {
    if (!selectedArea) {
      alert("กรุณาลากกรอบบริเวณที่ต้องการก่อน");
      return;
    }

    saveHistory();
    clearOverlay();

    applySelectedModeToCanvas(canvas, selectedArea);
    updateBaseImage();
    selectedArea = null;
    setStatus("แก้ไขพื้นที่ที่เลือกเรียบร้อยแล้ว");
  }

  function applySelectedModeToCanvas(targetCanvas, area) {
    const mode = modeSelect.value;

    if (mode === "blur") {
      blurArea(targetCanvas, area);
    } else if (mode === "remove") {
      removeObjectFromCanvas(targetCanvas, area);
    } else if (mode === "replace") {
      replaceObjectOnCanvas(targetCanvas, area);
    }
  }

  function blurArea(targetCanvas, area) {
    const targetCtx = targetCanvas.getContext("2d");
    const { x, y, w, h } = area;

    targetCtx.save();
    targetCtx.filter = "blur(22px)";
    targetCtx.drawImage(targetCanvas, x, y, w, h, x, y, w, h);
    targetCtx.restore();
  }

  function removeObjectFromCanvas(targetCanvas, area) {
    const targetCtx = targetCanvas.getContext("2d");
    const { x, y, w, h } = clampArea(area, targetCanvas.width, targetCanvas.height);

    const imageData = targetCtx.getImageData(0, 0, targetCanvas.width, targetCanvas.height);
    const data = imageData.data;
    const samples = [];
    const margin = Math.max(10, Math.round(Math.min(w, h) * 0.18));

    function samplePixel(px, py) {
      px = Math.round(Math.max(0, Math.min(px, targetCanvas.width - 1)));
      py = Math.round(Math.max(0, Math.min(py, targetCanvas.height - 1)));
      const idx = (py * targetCanvas.width + px) * 4;
      samples.push([data[idx], data[idx + 1], data[idx + 2]]);
    }

    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      samplePixel(x - margin, y + h * t);
      samplePixel(x + w + margin, y + h * t);
      samplePixel(x + w * t, y - margin);
      samplePixel(x + w * t, y + h + margin);
    }

    const avg = samples.reduce(
      (acc, c) => [acc[0] + c[0], acc[1] + c[1], acc[2] + c[2]],
      [0, 0, 0]
    ).map(v => Math.round(v / samples.length));

    targetCtx.save();

    const gradient = targetCtx.createLinearGradient(x, y, x + w, y + h);
    const leftColor = getAverageColor(targetCtx, Math.max(0, x - margin), y, Math.min(margin, targetCanvas.width), h);
    const rightColor = getAverageColor(targetCtx, Math.min(targetCanvas.width - margin, x + w), y, Math.min(margin, targetCanvas.width), h);

    gradient.addColorStop(0, `rgb(${leftColor[0]}, ${leftColor[1]}, ${leftColor[2]})`);
    gradient.addColorStop(0.5, `rgb(${avg[0]}, ${avg[1]}, ${avg[2]})`);
    gradient.addColorStop(1, `rgb(${rightColor[0]}, ${rightColor[1]}, ${rightColor[2]})`);

    targetCtx.fillStyle = gradient;
    targetCtx.fillRect(x, y, w, h);

    // Blend with surrounding pixels so the removed area does not look like a hard rectangle.
    targetCtx.globalAlpha = 0.35;
    const sourceX = x > targetCanvas.width / 2 ? Math.max(0, x - w - margin) : Math.min(targetCanvas.width - w, x + w + margin);
    const sourceY = y > targetCanvas.height / 2 ? Math.max(0, y - h - margin) : Math.min(targetCanvas.height - h, y + h + margin);
    try {
      targetCtx.drawImage(targetCanvas, sourceX, sourceY, w, h, x, y, w, h);
    } catch (err) {
      // Ignore drawImage errors for very small edge selections.
    }
    targetCtx.globalAlpha = 1;

    targetCtx.filter = "blur(8px)";
    targetCtx.drawImage(targetCanvas, x, y, w, h, x, y, w, h);
    targetCtx.restore();
  }

  function getAverageColor(targetCtx, x, y, w, h) {
    const safeX = Math.max(0, Math.round(x));
    const safeY = Math.max(0, Math.round(y));
    const safeW = Math.max(1, Math.min(Math.round(w), targetCanvasWidth(targetCtx) - safeX));
    const safeH = Math.max(1, Math.min(Math.round(h), targetCanvasHeight(targetCtx) - safeY));
    const pixels = targetCtx.getImageData(safeX, safeY, safeW, safeH).data;
    let r = 0, g = 0, b = 0, count = 0;

    for (let i = 0; i < pixels.length; i += 16) {
      r += pixels[i];
      g += pixels[i + 1];
      b += pixels[i + 2];
      count++;
    }

    return [Math.round(r / count), Math.round(g / count), Math.round(b / count)];
  }

  function targetCanvasWidth(targetCtx) {
    return targetCtx.canvas.width;
  }

  function targetCanvasHeight(targetCtx) {
    return targetCtx.canvas.height;
  }

  function replaceObjectOnCanvas(targetCanvas, area) {
    if (!replaceImage || !replaceImage.complete) {
      alert("กรุณาอัปโหลดภาพสำหรับแทนที่ก่อน");
      return;
    }

    const targetCtx = targetCanvas.getContext("2d");
    const { x, y, w, h } = clampArea(area, targetCanvas.width, targetCanvas.height);
    targetCtx.drawImage(replaceImage, x, y, w, h);
  }

  async function applyToAllPdfPages() {
    if (!pdfDoc) {
      alert("ฟังก์ชันนี้ใช้กับไฟล์ PDF เท่านั้น");
      return;
    }

    if (!selectedArea) {
      alert("กรุณาลากกรอบบนหน้าแรกก่อน เพื่อใช้ตำแหน่งเดียวกันกับทุกหน้า");
      return;
    }

    if (modeSelect.value === "replace" && (!replaceImage || !replaceImage.complete)) {
      alert("กรุณาอัปโหลดภาพสำหรับแทนที่ก่อน");
      return;
    }

    clearOverlay();
    setStatus("กำลังสร้าง PDF ใหม่ทุกหน้า...");

    const { jsPDF } = window.jspdf;
    let outputPdf = null;
    const areaForAllPages = { ...selectedArea };

    for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
      setStatus(`กำลังแก้ไขหน้า ${pageNum} / ${pdfDoc.numPages} ...`);

      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: renderScale });
      const tempCanvas = document.createElement("canvas");
      const tempCtx = tempCanvas.getContext("2d");

      tempCanvas.width = viewport.width;
      tempCanvas.height = viewport.height;

      await page.render({
        canvasContext: tempCtx,
        viewport: viewport
      }).promise;

      const scaledArea = scaleAreaForPage(areaForAllPages, canvas.width, canvas.height, tempCanvas.width, tempCanvas.height);
      applySelectedModeToCanvas(tempCanvas, scaledArea);

      const imgData = tempCanvas.toDataURL("image/jpeg", 0.95);
      const pdfWidth = viewport.width;
      const pdfHeight = viewport.height;
      const orientation = pdfWidth >= pdfHeight ? "landscape" : "portrait";

      if (!outputPdf) {
        outputPdf = new jsPDF({
          orientation,
          unit: "px",
          format: [pdfWidth, pdfHeight]
        });
      } else {
        outputPdf.addPage([pdfWidth, pdfHeight], orientation);
      }

      outputPdf.setPage(pageNum);
      outputPdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
    }

    outputPdf.save(pdfFileName);
    setStatus("สร้าง PDF ใหม่เรียบร้อยแล้ว");
    selectedArea = null;
  }

  function scaleAreaForPage(area, fromW, fromH, toW, toH) {
    return {
      x: area.x * toW / fromW,
      y: area.y * toH / fromH,
      w: area.w * toW / fromW,
      h: area.h * toH / fromH
    };
  }

  function undo() {
    if (history.length === 0) {
      alert("ไม่มีประวัติให้ย้อนกลับ");
      return;
    }

    const previous = history.pop();
    clearOverlay();
    ctx.putImageData(previous, 0, 0);
    updateBaseImage();
    selectedArea = null;
    setStatus("ย้อนกลับ 1 ขั้นตอนแล้ว");
  }

  function resetCanvas() {
    if (initialImage) {
      clearOverlay();
      ctx.putImageData(initialImage, 0, 0);
      updateBaseImage();
      history = [];
      selectedArea = null;
      setStatus("ล้างกลับเป็นไฟล์เริ่มต้นแล้ว");
    }
  }

  function downloadImage() {
    if (!baseImage) {
      alert("กรุณาอัปโหลดไฟล์ก่อน");
      return;
    }

    clearOverlay();
    const link = document.createElement("a");
    link.download = "edited-image.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  }
</script>

</body>
</html>
